<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Content Generator - Creator Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>✍️ Bulk Content Generator</h1>
            <p>Generate multiple variations of content for A/B testing</p>
        </header>
        <div class="main-content">
            <div class="input-section">
                <div class="form-group">
                    <label for="baseContent">Base Content</label>
                    <textarea id="baseContent" rows="6" placeholder="Enter your base content..."></textarea>
                </div>
                <div class="form-group">
                    <label for="variations">Number of Variations</label>
                    <input type="number" id="variations" min="2" max="10" value="5">
                </div>
                <div class="form-group">
                    <label for="variationType">Variation Type</label>
                    <select id="variationType">
                        <option value="headlines">Headlines</option>
                        <option value="descriptions">Descriptions</option>
                        <option value="cta">Call-to-Actions</option>
                        <option value="full">Full Content</option>
                    </select>
                </div>
                <button id="generateBtn" class="btn-primary">Generate Variations</button>
            </div>
            <div class="output-section">
                <h2>Generated Variations</h2>
                <div id="variationsList" class="variations-list"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
