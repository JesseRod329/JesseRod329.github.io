<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trend Analyzer - Creator Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📊 Trend Analyzer</h1>
            <p>Identify trending topics in your niche</p>
        </header>
        <div class="main-content">
            <div class="input-section">
                <div class="form-group">
                    <label for="niche">Your Niche</label>
                    <input type="text" id="niche" placeholder="e.g., technology">
                </div>
                <div class="form-group">
                    <label for="platform">Platform</label>
                    <select id="platform">
                        <option value="youtube">YouTube</option>
                        <option value="twitter">Twitter/X</option>
                        <option value="tiktok">TikTok</option>
                        <option value="instagram">Instagram</option>
                    </select>
                </div>
                <button id="analyzeBtn" class="btn-primary">Analyze Trends</button>
            </div>
            <div class="output-section">
                <h2>Trending Topics</h2>
                <div id="trends" class="trends"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
