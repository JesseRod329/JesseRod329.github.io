<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Kit Manager - Creator Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🎨 Brand Kit Manager</h1>
            <p>Centralized brand colors, fonts, logos with auto-application</p>
        </header>
        <div class="main-content">
            <div class="input-section">
                <div class="form-group">
                    <label>Brand Colors</label>
                    <div class="color-inputs">
                        <input type="color" id="color1" value="#667eea">
                        <input type="color" id="color2" value="#764ba2">
                        <input type="color" id="color3" value="#f093fb">
                        <input type="color" id="color4" value="#4facfe">
                    </div>
                </div>
                <div class="form-group">
                    <label for="fontFamily">Font Family</label>
                    <select id="fontFamily">
                        <option value="Inter">Inter</option>
                        <option value="Roboto">Roboto</option>
                        <option value="Poppins">Poppins</option>
                        <option value="Montserrat">Montserrat</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="brandName">Brand Name</label>
                    <input type="text" id="brandName" placeholder="Enter brand name">
                </div>
                <button id="saveBtn" class="btn-primary">Save Brand Kit</button>
            </div>
            <div class="output-section">
                <h2>Your Brand Kits</h2>
                <div id="brandKits" class="brand-kits"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
