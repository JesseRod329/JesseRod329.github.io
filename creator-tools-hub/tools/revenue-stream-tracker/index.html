<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenue Stream Tracker - Creator Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>💰 Revenue Stream Tracker</h1>
            <p>Track all income sources in one place</p>
        </header>
        <div class="main-content">
            <div class="input-section">
                <div class="form-group">
                    <label for="source">Income Source</label>
                    <input type="text" id="source" placeholder="e.g., YouTube AdSense">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="amount">Amount ($)</label>
                        <input type="number" id="amount" step="0.01" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date">
                    </div>
                </div>
                <button id="addBtn" class="btn-primary">Add Revenue</button>
            </div>
            <div class="output-section">
                <h2>Revenue Summary</h2>
                <div class="summary-cards">
                    <div class="summary-card">
                        <div class="summary-label">Total Revenue</div>
                        <div class="summary-value" id="totalRevenue">$0.00</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-label">This Month</div>
                        <div class="summary-value" id="monthRevenue">$0.00</div>
                    </div>
                </div>
                <div id="revenueList" class="revenue-list"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
