<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Template Generator - Creator Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🎨 Smart Template Generator</h1>
            <p>AI-powered design templates based on content type</p>
        </header>

        <div class="main-content">
            <div class="input-section">
                <div class="form-group">
                    <label for="contentType">Content Type</label>
                    <select id="contentType">
                        <option value="social-post">Social Media Post</option>
                        <option value="youtube-thumbnail">YouTube Thumbnail</option>
                        <option value="blog-header">Blog Header</option>
                        <option value="presentation">Presentation Slide</option>
                        <option value="infographic">Infographic</option>
                        <option value="quote-card">Quote Card</option>
                        <option value="announcement">Announcement</option>
                        <option value="promotion">Promotion Banner</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="title">Title/Headline</label>
                    <input type="text" id="title" placeholder="Enter your title">
                </div>

                <div class="form-group">
                    <label for="subtitle">Subtitle (optional)</label>
                    <input type="text" id="subtitle" placeholder="Enter subtitle">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="colorScheme">Color Scheme</label>
                        <select id="colorScheme">
                            <option value="vibrant">Vibrant</option>
                            <option value="minimal">Minimal</option>
                            <option value="dark">Dark</option>
                            <option value="pastel">Pastel</option>
                            <option value="professional">Professional</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="style">Style</label>
                        <select id="style">
                            <option value="modern">Modern</option>
                            <option value="classic">Classic</option>
                            <option value="bold">Bold</option>
                            <option value="elegant">Elegant</option>
                            <option value="playful">Playful</option>
                        </select>
                    </div>
                </div>

                <button id="generateBtn" class="btn-primary">Generate Template</button>
            </div>

            <div class="output-section">
                <div class="output-header">
                    <h2>Generated Template</h2>
                    <button id="downloadBtn" class="btn-secondary">Download as Image</button>
                </div>
                <div id="templateOutput" class="template-canvas">
                    <canvas id="templateCanvas"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
