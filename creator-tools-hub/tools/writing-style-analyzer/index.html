<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing Style Analyzer - Creator Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📝 Writing Style Analyzer</h1>
            <p>Analyze and improve writing tone and style</p>
        </header>
        <div class="main-content">
            <div class="input-section">
                <div class="form-group">
                    <label for="content">Your Content</label>
                    <textarea id="content" rows="12" placeholder="Paste your content..."></textarea>
                </div>
                <button id="analyzeBtn" class="btn-primary">Analyze Style</button>
            </div>
            <div class="output-section">
                <div id="styleMetrics" class="style-metrics"></div>
                <div id="toneAnalysis" class="tone-analysis"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
