<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Deduction Finder - Creator Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>💰 Tax Deduction Finder</h1>
            <p>Identify creator-related tax deductions</p>
        </header>
        <div class="main-content">
            <div class="input-section">
                <div class="form-group">
                    <label for="expenseType">Expense Type</label>
                    <select id="expenseType">
                        <option value="equipment">Equipment</option>
                        <option value="software">Software/Subscriptions</option>
                        <option value="home-office">Home Office</option>
                        <option value="travel">Travel</option>
                        <option value="education">Education/Training</option>
                        <option value="marketing">Marketing/Advertising</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="amount">Amount ($)</label>
                    <input type="number" id="amount" step="0.01" placeholder="0.00">
                </div>
                <button id="checkBtn" class="btn-primary">Check Deductibility</button>
            </div>
            <div class="output-section">
                <div id="result" class="result"></div>
                <div id="deductions" class="deductions"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
