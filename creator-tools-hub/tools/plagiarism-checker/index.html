<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plagiarism Checker - Creator Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📝 Plagiarism Checker</h1>
            <p>Fast, accurate plagiarism detection</p>
        </header>
        <div class="main-content">
            <div class="input-section">
                <div class="form-group">
                    <label for="content">Your Content</label>
                    <textarea id="content" rows="12" placeholder="Paste your content to check..."></textarea>
                </div>
                <button id="checkBtn" class="btn-primary">Check for Plagiarism</button>
            </div>
            <div class="output-section">
                <div class="result-display">
                    <div id="result" class="result"></div>
                </div>
                <div id="matches" class="matches"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
