<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Task Manager - Creator Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>⚡ Creator Task Manager</h1>
            <p>Task management tailored for creators</p>
        </header>
        <div class="main-content">
            <div class="input-section">
                <div class="form-group">
                    <label for="task">Task Name</label>
                    <input type="text" id="task" placeholder="e.g., Edit video for YouTube">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="priority">Priority</label>
                        <select id="priority">
                            <option value="high">High</option>
                            <option value="medium" selected>Medium</option>
                            <option value="low">Low</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="dueDate">Due Date</label>
                        <input type="date" id="dueDate">
                    </div>
                </div>
                <button id="addBtn" class="btn-primary">Add Task</button>
            </div>
            <div class="output-section">
                <div class="tabs">
                    <button class="tab active" data-filter="all">All</button>
                    <button class="tab" data-filter="pending">Pending</button>
                    <button class="tab" data-filter="completed">Completed</button>
                </div>
                <div id="tasksList" class="tasks-list"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
