<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cross-Platform Scheduler - Creator Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📱 Cross-Platform Scheduler</h1>
            <p>Schedule to all platforms from one interface</p>
        </header>
        <div class="main-content">
            <div class="input-section">
                <div class="form-group">
                    <label for="content">Post Content</label>
                    <textarea id="content" rows="8" placeholder="Enter your post content..."></textarea>
                </div>
                <div class="form-group">
                    <label>Select Platforms</label>
                    <div class="platform-checkboxes">
                        <label><input type="checkbox" value="twitter" checked> Twitter/X</label>
                        <label><input type="checkbox" value="instagram" checked> Instagram</label>
                        <label><input type="checkbox" value="facebook"> Facebook</label>
                        <label><input type="checkbox" value="linkedin"> LinkedIn</label>
                        <label><input type="checkbox" value="tiktok"> TikTok</label>
                        <label><input type="checkbox" value="youtube"> YouTube</label>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="date">Schedule Date</label>
                        <input type="date" id="date">
                    </div>
                    <div class="form-group">
                        <label for="time">Schedule Time</label>
                        <input type="time" id="time">
                    </div>
                </div>
                <button id="scheduleBtn" class="btn-primary">Schedule Posts</button>
            </div>
            <div class="output-section">
                <h2>Scheduled Posts</h2>
                <div id="scheduledPosts" class="scheduled-posts"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
