<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow Automator - Creator Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>⚡ Workflow Automator</h1>
            <p>Automate repetitive creator tasks</p>
        </header>
        <div class="main-content">
            <div class="input-section">
                <div class="form-group">
                    <label for="workflowName">Workflow Name</label>
                    <input type="text" id="workflowName" placeholder="e.g., Daily Post Schedule">
                </div>
                <div class="form-group">
                    <label for="trigger">Trigger</label>
                    <select id="trigger">
                        <option value="time">Time-based</option>
                        <option value="manual">Manual</option>
                        <option value="event">Event-based</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="actions">Actions (one per line)</label>
                    <textarea id="actions" rows="5" placeholder="e.g., Post to Instagram&#10;Send notification&#10;Update calendar"></textarea>
                </div>
                <button id="createBtn" class="btn-primary">Create Workflow</button>
            </div>
            <div class="output-section">
                <h2>Your Workflows</h2>
                <div id="workflows" class="workflows"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
