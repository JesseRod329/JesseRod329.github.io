<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fan Message Organizer - Creator Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>👥 Fan Message Organizer</h1>
            <p>Organize and prioritize messages from fans</p>
        </header>
        <div class="main-content">
            <div class="input-section">
                <div class="form-group">
                    <label for="fanName">Fan Name</label>
                    <input type="text" id="fanName" placeholder="Enter fan name">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="Enter message..."></textarea>
                </div>
                <div class="form-group">
                    <label for="priority">Priority</label>
                    <select id="priority">
                        <option value="high">High</option>
                        <option value="medium" selected>Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>
                <button id="addBtn" class="btn-primary">Add Message</button>
            </div>
            <div class="output-section">
                <div class="tabs">
                    <button class="tab active" data-filter="all">All</button>
                    <button class="tab" data-filter="high">High Priority</button>
                    <button class="tab" data-filter="unread">Unread</button>
                </div>
                <div id="messages" class="messages"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
